services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - DOCKER_MODS=linuxserver/mods:universal-package-install
      - INSTALL_PACKAGES=rsync
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - /opt/stacks/qbittorrent/config:/config
      - /home/user/downloads:/downloads
      - /opt/scripts:/opt/scripts
      - /mnt/nas:/mnt/nas
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    stop_grace_period: 10s
    restart: unless-stopped
networks:
  default:
    driver: bridge
    # If running inside a VM (e.g. Proxmox), the host's MTU may be lower than
    # 1500 due to hypervisor encapsulation. Set this to match ip link show eth0
    # on the host. Remove driver_opts entirely if running on bare metal.
    driver_opts:
      com.docker.network.driver.mtu: "1500"
